name: Terraform CI/CD

on:
  push:
    branches:
      - dev
      - test
      - main
  pull_request:
    branches:
      - main
      - dev
      - test
jobs:
  terraform:
    name: 'Terraform Lint, Security Check and Deploy'
    runs-on: ubuntu-latest
  
    env:
      AWS_REGION: 'us-east-1'
      TF_VERSION: '1.4.0'
      TFLINT_VERSION: '0.46.1'
      TFSEC_VERSION: '1.28.1'

    steps:
    - name: 'Checkout Github repository'
      uses: actions/checkout@v2
    
    - name: 'Set Environment'
      run: |
        if [[ "${GITHUB_BASE_REF}" == "dev" || "${GITHUB_REF}" == "refs/heads/dev" ]]; then
          echo "ENV=dev" >> $GITHUB_ENV
        elif [[ "${GITHUB_BASE_REF}" == "test" || "${GITHUB_REF}" == "refs/heads/test" ]]; then
          echo "ENV=test" >> $GITHUB_ENV
        elif [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
          echo "ENV=prod" >> $GITHUB_ENV
        else
          echo "Unknown branch: ${GITHUB_REF}"
          exit 1
        fi

    - name: 'Configure AWS credentials'
      uses: aws-actions/configure-aws-credentials@v1
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 'Set up Terraform'
      uses: hashicorp/setup-terraform@v1
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: 'Install TFLint'
      run: |
        curl -sLo tflint.zip https://github.com/terraform-linters/tflint/releases/download/v${{ env.TFLINT_VERSION }}/tflint_linux_amd64.zip
        unzip tflint.zip -d /usr/local/bin/
        tflint --version

    - name: 'Install tfsec'
      run: |
        curl -sLo tfsec https://github.com/aquasecurity/tfsec/releases/download/v${{ env.TFSEC_VERSION }}/tfsec-linux-amd64
        chmod +x tfsec
        mv tfsec /usr/local/bin/
        tfsec --version
    
    - name: 'Terraform Init'
      run: | 
        cd environments/${{ env.ENV }}
        terraform init --reconfigure
    
    - name: 'Terraform Format'
      run: terraform fmt

    - name: 'Terraform Validate'
      run: |
        cd environments/${{ env.ENV }}
        terraform validate

    - name: 'TFLint'
      run: | 
       tflint --init
       tflint
      
    - name: 'TFSec'
      run: tfsec .

    - name: 'Terraform Plan'
      run: | 
        cd environments/${{ env.ENV }}
        terraform plan -out=tfplan

    - name: 'Terraform Apply'
      if: github.event_name == 'push'
      run: |
        cd environments/${{ env.ENV }}
        terraform apply -auto-approve tfplan


    

